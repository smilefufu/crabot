name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # 不传 version，从根 package.json 的 packageManager 字段读取

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install and Build
        shell: bash
        run: |
          pnpm install

          # crabot-shared 必须先 install + build，其他模块通过 file: 引用它。
          # pnpm 对 file: 依赖在 install 时做快照复制，所以其他模块必须在
          # crabot-shared 已有 dist/ 之后再 install，否则拿到的是空快照。
          (cd crabot-shared && pnpm install && pnpm run build)

          for mod in crabot-core crabot-agent \
                     crabot-channel-host crabot-channel-telegram crabot-channel-wechat \
                     crabot-mcp-tools; do
            if [ -d "$mod" ]; then
              (cd "$mod" && pnpm install && pnpm run build)
            fi
          done

          # admin 单独：build 前需要 install（含前端依赖）
          (cd crabot-admin && pnpm install && pnpm run build && pnpm run build:web)
          pnpm run build:cli

      - name: Package (Unix)
        if: matrix.platform != 'windows'
        run: |
          VERSION=${GITHUB_REF_NAME}
          DIRNAME="crabot-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "/tmp/${DIRNAME}"

          # 复制运行时文件
          cp cli.mjs crabot.cmd package.json install.sh install.ps1 "/tmp/${DIRNAME}/"
          cp -r dist scripts node_modules "/tmp/${DIRNAME}/"

          # TS 模块：src/ 是源码，构建产物在 dist/，可排除 src/
          for mod in crabot-shared crabot-admin crabot-core crabot-agent \
                     crabot-channel-host crabot-channel-telegram crabot-channel-wechat \
                     crabot-mcp-tools; do
            if [ -d "$mod" ]; then
              rsync -a --exclude='/src/' --exclude='/test*/' --exclude='.git/' \
                    --exclude='node_modules/.cache/' --exclude='.venv/' \
                    --exclude='.env' "$mod/" "/tmp/${DIRNAME}/$mod/"
            fi
          done

          # Python 模块（crabot-memory）：src/ 是运行时代码，必须保留
          if [ -d "crabot-memory" ]; then
            rsync -a --exclude='/test*/' --exclude='.git/' \
                  --exclude='node_modules/.cache/' --exclude='.venv/' \
                  --exclude='.env' --exclude='__pycache__/' \
                  "crabot-memory/" "/tmp/${DIRNAME}/crabot-memory/"
          fi

          # 打包
          cd /tmp
          tar -czf "${DIRNAME}.tar.gz" "${DIRNAME}"
          shasum -a 256 "${DIRNAME}.tar.gz" > "${DIRNAME}.tar.gz.sha256"

          # 移回 workspace
          mv "${DIRNAME}.tar.gz" "${DIRNAME}.tar.gz.sha256" "$GITHUB_WORKSPACE/"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $DirName = "crabot-${Version}-windows-x64"
          $TempDir = "$env:TEMP\$DirName"
          New-Item -ItemType Directory -Force -Path $TempDir

          Copy-Item cli.mjs, crabot.cmd, package.json, install.sh, install.ps1 $TempDir
          Copy-Item -Recurse dist, scripts, node_modules $TempDir

          # TS 模块：src/ 是源码，构建产物在 dist/，可排除 src/
          $tsModules = @('crabot-shared','crabot-admin','crabot-core','crabot-agent',
                         'crabot-channel-host','crabot-channel-telegram','crabot-channel-wechat',
                         'crabot-mcp-tools')
          foreach ($mod in $tsModules) {
            if (Test-Path $mod) {
              $dest = Join-Path $TempDir $mod
              Copy-Item -Recurse $mod $dest
              Remove-Item -Recurse -Force "$dest\src" -ErrorAction SilentlyContinue
              Remove-Item -Recurse -Force "$dest\test*" -ErrorAction SilentlyContinue
              Remove-Item -Recurse -Force "$dest\.venv" -ErrorAction SilentlyContinue
            }
          }

          # Python 模块（crabot-memory）：src/ 是运行时代码，必须保留
          if (Test-Path 'crabot-memory') {
            $dest = Join-Path $TempDir 'crabot-memory'
            Copy-Item -Recurse 'crabot-memory' $dest
            Remove-Item -Recurse -Force "$dest\test*" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "$dest\.venv" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "$dest\__pycache__" -ErrorAction SilentlyContinue
          }

          Compress-Archive -Path $TempDir -DestinationPath "$DirName.zip"
          (Get-FileHash "$DirName.zip" -Algorithm SHA256).Hash | Out-File "$DirName.zip.sha256"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crabot-*.tar.gz
            crabot-*.tar.gz.sha256
            crabot-*.zip
            crabot-*.zip.sha256
