# Memory 模块测试配置（使用本地 ollama）

module_id: memory-default
module_type: memory
version: 0.1.0
protocol_version: 0.1.0
port: 19002
module_manager_url: http://localhost:19000

# LLM 配置（使用 ollama）
llm:
  api_key: ollama  # ollama 不需要真实 key，但需要非空值
  base_url: http://localhost:11434/v1
  model: qwen3.5:cloud
  temperature: 0.1
  max_retries: 3

# Embedding 配置（使用 ollama）
embedding:
  api_key: ollama  # ollama 不需要真实 key，但需要非空值
  base_url: http://localhost:11434/v1
  model: qwen3-embedding:0.6b
  dimension: 1024

# 去重配置
dedup:
  similarity_threshold: 0.85
  max_candidates: 3

# 存储配置
storage:
  data_dir: ./data/memory
  lancedb_dir: lancedb
  sqlite_file: metadata.db

# 压缩配置
compression:
  compression_threshold: 100
  compression_token_threshold: 50000
  retention_window_days: 3
  max_retention_days: 30
  window_size: 20

# 检索配置
retrieval:
  semantic_top_k: 10
  keyword_top_k: 10
  enable_planning: true
